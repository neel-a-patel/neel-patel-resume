<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0e27"/>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="40" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Letter N -->
  <text x="50" y="65" font-size="50" font-weight="bold" fill="url(#grad1)" 
        text-anchor="middle" font-family="Arial, sans-serif">N</text>
  
  <!-- Letter P -->
  <text x="50" y="65" font-size="50" font-weight="bold" fill="url(#grad1)" 
        text-anchor="middle" font-family="Arial, sans-serif" opacity="0.5" letter-spacing="-15">P</text>
  
  <!-- Accent dots -->
  <circle cx="30" cy="30" r="2" fill="#00d4ff" opacity="0.8"/>
  <circle cx="70" cy="70" r="2" fill="#0099ff" opacity="0.8"/>
</svg>
